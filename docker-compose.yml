    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started

  backend:
    build:
      dockerfile: ./backend/Dockerfile
    container_name: lootbase-backend
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__LootBase: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__Redis: "redis:6379"
      Steam__Realm: ${Steam__Realm}
      Steam__ReturnUrl: ${Steam__ReturnUrl}
      Steam__FrontendBaseUrl: ${Steam__FrontendBaseUrl}
      Steam__WebApiKey: ${Steam__WebApiKey}
      Cors__AllowedOrigins__0: ${Cors__AllowedOrigins__0}
    ports:
      - "5188:5188"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:18
    container_name: lootbase-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - lootbase-postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: lootbase-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  lootbase-postgres:
