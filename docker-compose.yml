services:
  postgres:
    image: postgres:18
    container_name: lootbase-postgres
    environment:
      POSTGRES_DB: lootbase
      POSTGRES_USER: lootbase
      POSTGRES_PASSWORD: lootbase
    ports:
      - "5432:5432"
    volumes:
      - lootbase-postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lootbase -d lootbase"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: lootbase-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  lootbase-postgres:
