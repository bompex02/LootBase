services:
  postgres:
    image: postgres:18
    container_name: lootbase-postgres
    environment:
      POSTGRES_DB: lootbase
      POSTGRES_USER: lootbase
      POSTGRES_PASSWORD: lootbase
    ports:
      - "5432:5432"
    volumes:
      - lootbase-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lootbase -d lootbase"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  lootbase-postgres:
