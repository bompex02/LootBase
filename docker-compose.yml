services:
  frontend:
    build:
      dockerfile: ./frontend/Dockerfile
    container_name: lootbase-node
    environment:
      NUXT_PUBLIC_API_BASE: "http://localhost:5188"
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started

  backend:
    build:
      dockerfile: ./backend/Dockerfile
    container_name: lootbase-backend
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__LootBase: "Host=postgres;Port=5432;Database=lootbase;Username=lootbase;Password=lootbase"
      ConnectionStrings__Redis: "redis:6379"
      Steam__Realm: "http://localhost:5188/"
      Steam__ReturnUrl: "http://localhost:5188/api/auth/steam/callback"
      Steam__FrontendBaseUrl: "http://localhost:3000"
      Steam__WebApiKey: ${Steam__WebApiKey}
      Cors__AllowedOrigins__0: "http://localhost:3000"
    ports:
      - "5188:5188"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:18
    container_name: lootbase-postgres
    environment:
      POSTGRES_DB: lootbase
      POSTGRES_USER: lootbase
      POSTGRES_PASSWORD: lootbase
    ports:
      - "5432:5432"
    volumes:
      - lootbase-postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lootbase -d lootbase"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: lootbase-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  lootbase-postgres:
